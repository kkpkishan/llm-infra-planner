# Notes on fields:
#   vendor: nvidia | amd | apple | google-tpu | intel | aws | huawei |
#           cerebras | groq | sambanova | tenstorrent | qualcomm
#   category: consumer | workstation | datacenter | apple-silicon | tpu |
#             edge | wafer-scale
#   flops: TFLOPS for fp32/fp16/bf16/fp8/fp4, TOPS for int8/int4
