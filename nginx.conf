# ── Worker tuning ─────────────────────────────────────────────────────────────
worker_processes      auto;
worker_rlimit_nofile  65535;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main buffer=16k flush=5s;
    error_log   /var/log/nginx/error.log   warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    reset_timedout_connection on;
    server_tokens       off;

    # ── Buffer / timeout tuning ────────────────────────────────────────────────
    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    client_max_body_size        1m;
    large_client_header_buffers 4 8k;
    client_body_timeout         12s;
    client_header_timeout       12s;
    send_timeout                10s;

    # ── Open file cache ────────────────────────────────────────────────────────
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml application/geo+json
        application/javascript application/x-javascript
        application/json application/ld+json application/manifest+json
        application/wasm application/x-font-ttf application/xhtml+xml application/xml
        font/eot font/otf font/ttf font/woff font/woff2
        image/bmp image/svg+xml image/x-icon
        text/cache-manifest text/css text/javascript
        text/markdown text/plain text/xml text/vtt;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=general:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    server {
        listen       80;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        limit_conn addr 100;

        # ── Security headers ───────────────────────────────────────────────────
        # Defined at server level with NO add_header in location / so these
        # are not cleared by child location blocks (nginx inheritance rule:
        # a location block clears parent add_header only if it defines its own).
        # The location / block below intentionally has NO add_header directives.
        add_header X-Frame-Options              "SAMEORIGIN"                                     always;
        add_header X-Content-Type-Options       "nosniff"                                        always;
        add_header X-XSS-Protection             "1; mode=block"                                  always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"                always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()"       always;
        add_header Cross-Origin-Opener-Policy   "same-origin"                                    always;
        add_header Cross-Origin-Resource-Policy "same-origin"                                    always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload"   always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
            always;
        # Cache-control for HTML (no-store) — also at server level
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;

        # ── Block attack surfaces ──────────────────────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ { return 404; }
        location ~ /\.(?!well-known)                        { deny all; return 404; }
        location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin|\.env|\.git) { deny all; return 404; }

        # ── Health check ───────────────────────────────────────────────────────
        location = /health {
            access_log  off;
            add_header  Content-Type  "text/plain; charset=utf-8" always;
            add_header  Cache-Control "no-store"                  always;
            return 200  "ok\n";
        }

        # ── Hashed assets — 1 year immutable ──────────────────────────────────
        # These override the server-level Cache-Control for assets only.
        location ^~ /assets/ {
            limit_req  zone=general burst=200 nodelay;
            expires    1y;
            add_header Cache-Control                "public, immutable, no-transform"              always;
            add_header X-Content-Type-Options       "nosniff"                                      always;
            add_header X-Frame-Options              "SAMEORIGIN"                                   always;
            add_header Referrer-Policy              "strict-origin-when-cross-origin"              always;
            add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()"     always;
            add_header Cross-Origin-Resource-Policy "same-origin"                                  always;
            add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
            access_log off;
        }

        # ── Fonts ──────────────────────────────────────────────────────────────
        location ~* \.(woff2?|ttf|eot|otf)$ {
            expires    1y;
            add_header Cache-Control               "public, immutable, no-transform" always;
            add_header Access-Control-Allow-Origin "*"                               always;
            add_header X-Content-Type-Options      "nosniff"                         always;
            access_log off;
        }

        # ── Images / icons ─────────────────────────────────────────────────────
        location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
            expires    30d;
            add_header Cache-Control          "public, no-transform" always;
            add_header X-Content-Type-Options "nosniff"              always;
            access_log off;
        }

        # ── Favicon ────────────────────────────────────────────────────────────
        location = /favicon.ico {
            expires       30d;
            add_header    Cache-Control "public" always;
            access_log    off;
            log_not_found off;
        }

        # ── robots.txt ─────────────────────────────────────────────────────────
        location = /robots.txt {
            add_header    Cache-Control "public, max-age=86400" always;
            access_log    off;
            log_not_found off;
        }

        # ── SPA fallback — NO add_header here so server-level headers apply ────
        location / {
            limit_req zone=general burst=60 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # ── Error pages ────────────────────────────────────────────────────────
        error_page 404             /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
